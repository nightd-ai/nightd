
[tasks.test]
description = "Run all checks on this project"
run = [
  "ruff format --check",
  "ruff check",
  "ty check",
  "pytest",
]

[tasks.dev]
description = "Start development environment (Docker Compose)"
run = "docker-compose up -d"

[tasks.dev-down]
description = "Shut down development environment"
run = "docker-compose down"

[settings]
python.uv_venv_auto = true

[env]
_.file = '.env'

[tools]
uv = "latest"
