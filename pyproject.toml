[project]
name = "nightd-workspace"
version = "0.1.0"
description = "A scheduler for autonomous coding agents"
readme = "README.md"
license = "FSL-1.1-ALv2"
requires-python = ">=3.14"
dependencies = [
    "nightd",
]

[dependency-groups]
dev = [
    "nightctl",
    "pytest>=9.0.2",
    "respx>=0.22.0",
    "ruff>=0.15.2",
    "ty>=0.0.17",
    "zensical>=0.0.23",
]

[tool.uv.sources]
nightd = { workspace = true }
nightctl = { workspace = true }

[tool.uv.workspace]
members = ["packages/*"]
